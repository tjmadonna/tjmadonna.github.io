- name: Recipe Link
  description: >
    Recipe Link stores your online recipes in a clean interface that allows you to quickly search and filter. 
    The app uses a Flask REST API backend, written in Python, to retrieve important recipe information from the webpage.
    Recipe Link is still being maintained and version 3 is expected at the beginning of 2020.
  role: Sole Android and Python developer from new project to current release
  technologies: Java, Kotlin, RxJava, SQLite, Retrofit, Flask (Python)
  url: https://play.google.com/store/apps/details?id=com.inelasticcollision.recipelink
